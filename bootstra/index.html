<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <div class="container">
        <!-- Billing Address -->
        <div class="billing-name ">
            <h2>Billing Address</h2>
        </div>
        <form action="">
            <div class="row">
                <div class="col-12 col-md-6 mb-3 ">
                    <label for="exampleInputEmail1" class="form-label">First name</label>
                    <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
                
                </div>
                
                <!-- last name input -->

                <div class="col-12 col-md-6">
                    <label for="exampleInputEmail1" class="form-label">Last name</label>
                    <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
                    
                </div>
            </div>
            <div class="row">
                <div class="col">
                    <label for="exampleInputEmail1" class="form-label">Username</label>
                    <div class="input-group mb-3">
                        <span class="input-group-text" id="basic-addon1">@</span>
                        <input type="text" class="form-control" placeholder="" aria-label="Username" aria-describedby="basic-addon1">
                    </div>
                </div>
            </div>
            
            <!-- Email input -->
            
            <div class="row mb-3">
                <div class="col">
                    <label for="exampleInputEmail1" class="form-label">Email <span class="text-opacity-25" style="opacity: 50%;">(Optional)</span></label>
                    <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp" placeholder="you@example.com">
                
                </div>
            </div>

            <!-- Adres input -->
           
            <div class="row mb-3">
                <div class="col">
                    <label for="exampleDataList" class="form-label">Address</label>
                    <input class="form-control" list="datalistOptions" id="exampleDataList" placeholder="1234 Main St">
                </div>
            </div>
            
            <!-- Adres 2 -->
            
            <div class="row mb-3">
                <div class="col">
                    <label for="exampleDataList" class="form-label">Address 2</label>
                    <input class="form-control" list="datalistOptions" id="exampleDataList" placeholder="Appertment or suite">
                </div>      
            </div>
           
            <!-- country input -->
           
            <div class="row">
                <div class="col-12 col-md-5">
                    <label for="country">Country</label>
                      <select class="form-select" aria-label="Country" id="country" required>
                        <option selected disabled value="">Choose...</option>
                        <option value="1">Uzbekistan</option>
                        <option value="2">Russian</option>
                        <option value="3">Japan</option>
                        <option value="4">USA</option>
                    </select>
                </div>
               
                <!-- state input -->
               
                <div class="col-12 col-md-4">
                    <label for="state">State</label>
                     <select class="form-select" aria-label="State" id="state" required>
                        <option selected disabled value="">Choose...</option>
                        <option value="1">Namangan</option>
                        <option value="2">Toshkent</option>
                        <option value="3">Samarqand</option>
                        <option value="4">Farg'ona</option>
                    </select>
                </div>
                <!-- zip input -->
                <div class="col mb-3">
                    <div class="row">
                    <div class="col">
                         <label for="zipcode">
                            Zip code
                         </label>
                    <input type="number" id="zipcode" class="form-control" required>
                    <div class="invalid-feedback">
                        Zip code required
                    </div>
                </div>
                </div>
            </div>
            <hr >
           
            <!-- check input -->
           
            <div class="row mb-3">
                <div class="col-12">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="" id="shipping-address">
                        <label class="form-check-label" for="shipping-address">
                            Shipping address is the same as my billing address
                        </label>
                    </div>
                    <!-- check input 2 -->
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="" id="save-information">
                        <label class="form-check-label" for="save-information">
                            Save this information for next time
                        </label>
                    </div>
                </div>
            </div>
            <hr>
          
            <!-- redio input -->
          
            <div class="row">
                <div class="col">
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="radioDefault" id="radioDefault1">
                        <label class="form-check-label" for="radioDefault1">
                            Credit card
                        </label>
                        </div>
                       
                        <!-- radio input -->
                       
                        <div class="form-check">
                        <input class="form-check-input" type="radio" name="radioDefault" id="radioDefault2" checked>
                        <label class="form-check-label" for="radioDefault2">
                            Depit card
                        </label>
                    </div>
                      
                    <!-- radio input -->
                    
                    <div class="form-check mb-3">
                        <input class="form-check-input" type="radio" name="radioDefault" id="radioDefault2" checked>
                        <label class="form-check-label" for="radioDefault2">
                            PayPal
                        </label>
                    </div>
                </div>
            </div>
          
            <!-- name in card input -->
          
            <div class="row mb-3">
                <div class="col-6">
                    <label for="exampleInputEmail1" class="form-label">Name on Card</label>
                    <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
                </div>
               
                <!-- credit card number input -->
               
                <div class="col-6">
                        <label for="zipcode" class="form-label">
                            Credit card number 
                        </label>
                    <input type="number" id="zipcode" class="form-control" required>
                </div>
            
                <!-- expiration input -->
            
            </div>
            
            <div class="row">
                <div class="col-3">
                       <label for="zipcode" class="form-label">
                            Expiration
                        </label>
                    <input type="number" id="zipcode" class="form-control" required>
                </div>
               <!-- credit card number input -->
                <div class="col-3 mb-3">
                      <label for="zipcode" class="form-label">
                            Credit card number 
                        </label>
                    <input type="number" id="zipcode" class="form-control" required>
                </div>
                </div>
            </div>
            <hr>
            <div class="row">
                <button type="submit" class="btn btn-primary">Submit</button>
            </div>
        </form>
   

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
